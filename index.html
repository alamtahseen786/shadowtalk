<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShadowTalk</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- BANNER -->
    <img src="banner.png" class="banner" alt="banner">

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- LOGO -->
        <div class="logo">
            ShadowTalk
        </div>

        <!-- SUBTITLE -->
        <p class="subtitle">
            Where hidden voices finally speak.
        </p>

        <!-- CONFESSION SECTION -->
        <div class="confession-layout">

            <!-- LEFT SIDE -->
            <div class="confession-box">

                <textarea 
                    id="confession"
                    placeholder="What's on your mind?">
                </textarea>

                <button onclick="addPost()">
                    Post Anonymously
                </button>

            </div>

            <!-- RIGHT SIDE -->
            <div class="posts-panel">

                <div id="posts"></div>

            </div>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>

</html>
